name: Deploy API to Elastic Beanstalk

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  EB_APPLICATION_NAME: wzrusz-api-staging
  EB_ENVIRONMENT_NAME: Wzrusz-api-staging-env

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: wzrusz
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # RDS is in a private VPC — GitHub runners cannot reach it (ETIMEDOUT).
      # Migrations run on EB via .platform/hooks/postdeploy using DATABASE_URL from EB env.

      - name: Build API
        run: npx nx run api:build --configuration=production

      - name: Compile migration bundle for EB
        run: npx tsc -p apps/api/tsconfig.migrate.json

      - name: Package deployment artifact
        run: |
          cd dist/apps/api
          node -e "
            const fs = require('fs');
            const path = require('path');
            const rootPkg = JSON.parse(fs.readFileSync(path.join('..', '..', '..', 'package.json'), 'utf8'));
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.scripts = { start: 'node main.js' };
            pkg.engines = { node: '>=20' };
            if (rootPkg.dependencies?.pg) pkg.dependencies.pg = rootPkg.dependencies.pg;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          # npm install (not ci) so lockfile matches package.json after adding pg
          npm install --omit=dev --no-audit --no-fund
          test -f migrate/database/run-migrations.js
          test -d node_modules/pg
          cp -r ../../../apps/api/src/certs ./certs
          test -f certs/rds-ca-bundle.pem
          mkdir -p .platform/hooks/postdeploy
          cp ../../../apps/api/.platform/hooks/postdeploy/01_migrate.sh .platform/hooks/postdeploy/
          chmod +x .platform/hooks/postdeploy/01_migrate.sh
          zip -r ../../../api-deploy.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1.0.4
        with:
          aws-region: ${{ env.AWS_REGION }}
          application-name: ${{ env.EB_APPLICATION_NAME }}
          environment-name: ${{ env.EB_ENVIRONMENT_NAME }}
          version-label: api-${{ github.sha }}
          deployment-package-path: api-deploy.zip
          platform-arn: arn:aws:elasticbeanstalk:eu-central-1::platform/Node.js 24 running on 64bit Amazon Linux 2023
          option-settings: |
            [
              {
                "Namespace": "aws:autoscaling:launchconfiguration",
                "OptionName": "IamInstanceProfile",
                "Value": "aws-elasticbeanstalk-ec2-role"
              },
              {
                "Namespace": "aws:elasticbeanstalk:environment",
                "OptionName": "ServiceRole",
                "Value": "aws-elasticbeanstalk-service-role"
              },
              {
                "Namespace": "aws:elasticbeanstalk:application:environment",
                "OptionName": "PORT",
                "Value": "8080"
              },
              {
                "Namespace": "aws:elasticbeanstalk:application:environment",
                "OptionName": "HOST",
                "Value": "0.0.0.0"
              },
              {
                "Namespace": "aws:elasticbeanstalk:application:environment",
                "OptionName": "NODE_ENV",
                "Value": "production"
              },
              {
                "Namespace": "aws:elasticbeanstalk:application:environment",
                "OptionName": "APP_ENV",
                "Value": "staging"
              }
            ]
          wait-for-environment-recovery: true
