name: Deploy API to Elastic Beanstalk

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  EB_APPLICATION_NAME: wzrusz-api
  EB_ENVIRONMENT_NAME: wzrusz-api-staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build API
        run: npx nx run api:build --configuration=production

      - name: Prune lockfile for deploy bundle
        run: npx nx run api:prune

      - name: Package deployment artifact
        run: |
          cd dist/apps/api
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.scripts = { start: 'node main.js' };
            pkg.engines = { node: '>=20' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          zip -r ../../../api-deploy.zip .

      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: ${{ env.AWS_REGION }}
          application_name: ${{ env.EB_APPLICATION_NAME }}
          environment_name: ${{ env.EB_ENVIRONMENT_NAME }}
          version_label: ${{ github.sha }}
          deployment_package: api-deploy.zip
          wait_for_environment_recovery: true
