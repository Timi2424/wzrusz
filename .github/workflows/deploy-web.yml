name: Deploy Web SSR to Elastic Beanstalk

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  EB_APPLICATION_NAME: wzrusz-web
  EB_ENVIRONMENT_NAME: wzrusz-web-staging
  EB_API_ENVIRONMENT_NAME: Wzrusz-api-staging-env

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: wzrusz
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve API URL from Elastic Beanstalk
        run: |
          API_URL=$(bash scripts/resolve-eb-api-url.sh)
          echo "NX_API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "Resolved $API_URL"

      - name: Verify NX_API_URL resolves
        run: npm run verify-api-url

      - name: Inject API URL for browser bundle
        run: npm run write-api-url

      - name: Build Angular SSR
        env:
          NG_ALLOWED_HOSTS: '*.elasticbeanstalk.com,*.amazonaws.com'
        run: npx nx run web:build --configuration=production

      - name: Package SSR deployment artifact
        run: |
          cd dist/apps/web
          cat > package.json <<'EOF'
          {
            "name": "wzrusz-web",
            "private": true,
            "type": "module",
            "scripts": {
              "start": "node server/server.mjs"
            },
            "engines": {
              "node": ">=20"
            }
          }
          EOF
          zip -r ../../../web-deploy.zip .

      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1.0.4
        with:
          aws-region: ${{ env.AWS_REGION }}
          application-name: ${{ env.EB_APPLICATION_NAME }}
          environment-name: ${{ env.EB_ENVIRONMENT_NAME }}
          version-label: web-${{ github.sha }}
          deployment-package-path: web-deploy.zip
          platform-arn: arn:aws:elasticbeanstalk:eu-central-1::platform/Node.js 24 running on 64bit Amazon Linux 2023
          option-settings: |
            [
              {
                "Namespace": "aws:autoscaling:launchconfiguration",
                "OptionName": "IamInstanceProfile",
                "Value": "aws-elasticbeanstalk-ec2-role"
              },
              {
                "Namespace": "aws:elasticbeanstalk:environment",
                "OptionName": "ServiceRole",
                "Value": "aws-elasticbeanstalk-service-role"
              },
              {
                "Namespace": "aws:elasticbeanstalk:application:environment",
                "OptionName": "PORT",
                "Value": "8080"
              },
              {
                "Namespace": "aws:elasticbeanstalk:application:environment",
                "OptionName": "HOST",
                "Value": "0.0.0.0"
              },
              {
                "Namespace": "aws:elasticbeanstalk:application:environment",
                "OptionName": "NODE_ENV",
                "Value": "production"
              }
            ]
          wait-for-environment-recovery: true
