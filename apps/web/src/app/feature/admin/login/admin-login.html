<section class="admin-login">
  <div class="admin-login__card">
    <h1>Logowanie do panelu</h1>
    <p class="admin-login__lead">Dostęp tylko dla administratorów Wzrusz.</p>

    @if (error()) {
      <p class="admin-login__error" role="alert">{{ error() }}</p>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="admin-login__field">
        <span>Email</span>
        <input type="email" formControlName="email" autocomplete="username" />
      </label>

      <label class="admin-login__field">
        <span>Hasło</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
      </label>

      <button type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Logowanie…' : 'Zaloguj się' }}
      </button>
    </form>

    <p class="admin-login__back">
      <a routerLink="/">← Wróć na stronę publiczną</a>
    </p>
  </div>
</section>
