<header
  class="site-header"
  [class.site-header--hidden]="!sticky.visible()"
  data-testid="site-header"
>
  <div class="site-header__inner">
    <a class="site-header__logo" routerLink="/" aria-label="Wzrusz — strona główna">
      Wzrusz
    </a>

    <nav class="site-header__nav" aria-label="Menu główne">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
        Start
      </a>
      <a routerLink="/katalog" routerLinkActive="is-active">Katalog</a>
      <a routerLink="/dekolista" routerLinkActive="is-active" class="site-header__dekolista">
        Dekolista
      </a>
    </nav>
  </div>
</header>
