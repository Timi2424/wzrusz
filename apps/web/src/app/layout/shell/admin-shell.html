<div class="admin-shell">
  <header class="admin-shell__header">
    <div class="admin-shell__brand">
      <a routerLink="/admin">Wzrusz — panel</a>
    </div>
    <nav class="admin-shell__nav" aria-label="Panel admina">
      <a routerLink="/admin" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
        Pulpit
      </a>
      <a routerLink="/admin/zapytania" routerLinkActive="is-active">Zapytania</a>
      <a routerLink="/admin/katalog" routerLinkActive="is-active">Katalog</a>
    </nav>
    <div class="admin-shell__user">
      <span>{{ session.user()?.email }}</span>
      <button type="button" class="admin-shell__logout" (click)="logout()">
        Wyloguj
      </button>
    </div>
  </header>
  <main class="admin-shell__main">
    <router-outlet />
  </main>
</div>
