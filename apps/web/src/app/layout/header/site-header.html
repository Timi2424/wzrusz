<header
  class="site-header"
  [class.site-header--hidden]="!sticky.visible()"
  data-testid="site-header"
>
  <div class="site-header__inner">
    <a class="site-header__logo" routerLink="/" aria-label="Wzrusz — strona główna">
      <picture>
        <source [srcset]="logoSrc" type="image/webp" />
        <img
          class="site-header__logo-image"
          [src]="logoFallbackSrc"
          alt=""
          width="260"
          height="78"
        />
      </picture>
    </a>

    <nav class="site-header__nav" aria-label="Menu główne">
      <a class="site-header__nav-link" routerLink="/katalog">Katalog</a>
      <a class="site-header__nav-link site-header__nav-link--dekolista" routerLink="/dekolista">
        Dekolista
        @if (dekolista.totalQuantity() > 0) {
          <span class="site-header__nav-badge" aria-label="Pozycje na Dekoliście">
            {{ dekolista.totalQuantity() }}
          </span>
        }
        <i class="pi pi-list site-header__nav-icon" aria-hidden="true"></i>
      </a>
    </nav>
  </div>
</header>
